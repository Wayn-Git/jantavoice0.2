services:
  - type: web
    name: janta-voice-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: AUTO_CHECK_ENABLED
        value: true
      - key: FAKE_DETECTION_ENABLED
        value: true
      - key: ESCALATION_ENABLED
        value: true
